<!--
  pt-header-logo.svg
  Chỉ icon lục giác + 2 cá heo vàng (path 1 từ file vector gốc).
  Dùng cho header, footer, button, badge.
  Crop viewBox để chỉ hiện phần icon, không có chữ "PT".

  2 lớp cùng 1 path: lớp dưới chỉ subpath lục giác (tô vàng, đặc, không lỗ),
  lớp trên là path gốc đầy đủ (tô xanh) — 3 subpath cá heo bên trong dùng
  fill-rule nonzero tạo thành lỗ, để lộ lớp vàng bên dưới → hiệu ứng
  "lục giác xanh, cá heo vàng" mà không cần tách lại vector gốc.
-->
