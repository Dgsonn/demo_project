<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<title>PT Hero Render</title>
<style>
  html, body { margin: 0; padding: 0; background: #f8f4ec; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c" width="1920" height="1080"></canvas>
<script>
/* ======================================================================
   PT Flour — Hero render (5s loop)
   Sequence (out of 5s):
     0.0 - 0.8s : cream bg, static.
     0.4 - 1.6s : golden particles burst from screen edges toward center.
     1.4 - 2.0s : hex outline draws (stroke-dashoffset).
     1.8 - 2.6s : hex fills navy.
     2.4 - 3.4s : 2 yellow dolphins swim in (S-curve path) and settle.
     3.2 - 3.8s : "PT" text scale-in.
     3.6 - 4.6s : tagline "PT FLOUR · VIETNAM" fade in.
     4.6 - 5.0s : hold.
   Output: webm (MediaRecorder), 1920x1080, 30fps.
   ====================================================================== */
const W = 1920, H = 1080;
const c = document.getElementById('c');
const ctx = c.getContext('2d');
const FPS = 30;
const DURATION = 5.0; // seconds
const FRAMES = Math.round(DURATION * FPS);

// palette
const NAVY = '#0a2540';
const NAVY_DEEP = '#061a2e';
const GOLD = '#e8b547';
const GOLD_SOFT = '#f3d28a';
const CREAM = '#f8f4ec';
const CREAM_DEEP = '#efe7d4';

// easing
const ease = {
  outCubic: t => 1 - Math.pow(1 - t, 3),
  inOutCubic: t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2,
  outBack: (t, s=1.7) => 1 + (s+1)*Math.pow(t-1,3) + s*Math.pow(t-1,2),
};

// === Random seeded (mulberry32) để render deterministic ===
function mulberry32(a){return function(){let t=a+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;}}
const rng = mulberry32(42);

// === Particles ===
const particles = [];
const N = 220;
const cx = W/2, cy = H/2 - 40;
for (let i = 0; i < N; i++) {
  const a = rng() * Math.PI * 2;
  const startR = 600 + rng() * 400;
  const endR = (i % 2 === 0 ? 1 : -1) * (60 + rng() * 120) + (rng() - 0.5) * 240;
  const ea = a + (rng() - 0.5) * 0.5;
  particles.push({
    sx: cx + Math.cos(a) * startR,
    sy: cy + Math.sin(a) * startR,
    tx: cx + Math.cos(ea) * (80 + rng() * 180),
    ty: cy + Math.sin(ea) * (40 + (rng() - 0.5) * 280),
    r: 1.4 + rng() * 3.0,
    color: rng() > 0.5 ? GOLD : GOLD_SOFT,
    delay: 0.05 + rng() * 0.4,
    duration: 0.7 + rng() * 0.5,
  });
}

// === Hex path (lục giác đều) ===
const hexPts = [];
const HEX_R = 220;
for (let i = 0; i < 6; i++) {
  const a = -Math.PI/2 + i * Math.PI/3;
  hexPts.push([cx + Math.cos(a)*HEX_R, cy + Math.sin(a)*HEX_R]);
}
function hexPath() {
  ctx.beginPath();
  ctx.moveTo(...hexPts[0]);
  for (let i=1;i<6;i++) ctx.lineTo(...hexPts[i]);
  ctx.closePath();
}

// === Dolphin curves (S-shape paths cho 2 cá heo) ===
// Cá trên: bắt đầu ngoài trái, uốn cong vào tâm phía trên logo
const DOLPHIN_UP = {
  start: [cx - 500, cy - 100],
  ctrl1: [cx - 200, cy - 300],
  ctrl2: [cx + 80, cy - 240],
  end:   [cx + 50, cy - 60],
};
// Cá dưới: đối xứng dọc
const DOLPHIN_DOWN = {
  start: [cx + 500, cy + 100],
  ctrl1: [cx + 200, cy + 300],
  ctrl2: [cx - 80, cy + 240],
  end:   [cx - 50, cy + 60],
};

function drawDolphin(t, flip) {
  // t: 0 → 1 (path progress), flip: false = cá trên (mõm phải), true = cá dưới (mõm trái, lật dọc)
  const s = flip ? DOLPHIN_DOWN : DOLPHIN_UP;
  const e = ease.outCubic(Math.min(1, Math.max(0, t)));
  // bezier point
  const x = Math.pow(1-e,3)*s.start[0] + 3*Math.pow(1-e,2)*e*s.ctrl1[0] + 3*(1-e)*e*e*s.ctrl2[0] + e*e*e*s.end[0];
  const y = Math.pow(1-e,3)*s.start[1] + 3*Math.pow(1-e,2)*e*s.ctrl1[1] + 3*(1-e)*e*e*s.ctrl2[1] + e*e*e*s.end[1];
  // hướng tiếp tuyến (đạo hàm bezier)
  const dx = 3*Math.pow(1-e,2)*(s.ctrl1[0]-s.start[0]) + 6*(1-e)*e*(s.ctrl2[0]-s.ctrl1[0]) + 3*e*e*(s.end[0]-s.ctrl2[0]);
  const dy = 3*Math.pow(1-e,2)*(s.ctrl1[1]-s.start[1]) + 6*(1-e)*e*(s.ctrl2[1]-s.ctrl1[1]) + 3*e*e*(s.end[1]-s.ctrl2[1]);
  const ang = Math.atan2(dy, dx);

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(ang + (flip ? Math.PI : 0));
  // body — stylized cá heo
  ctx.fillStyle = GOLD;
  ctx.beginPath();
  // thân cong
  ctx.moveTo(-30, 0);
  ctx.bezierCurveTo(-25, -16, 10, -18, 26, -6);
  ctx.bezierCurveTo(38, 2, 38, 8, 26, 14);
  ctx.bezierCurveTo(10, 22, -25, 18, -30, 0);
  ctx.closePath();
  ctx.fill();
  // vây lưng
  ctx.beginPath();
  ctx.moveTo(-4, -8);
  ctx.quadraticCurveTo(2, -18, 12, -10);
  ctx.closePath();
  ctx.fill();
  // đuôi
  ctx.beginPath();
  ctx.moveTo(26, 6);
  ctx.quadraticCurveTo(44, -4, 50, 0);
  ctx.quadraticCurveTo(44, 4, 26, 14);
  ctx.closePath();
  ctx.fill();
  // mắt
  ctx.fillStyle = NAVY;
  ctx.beginPath();
  ctx.arc(16, -2, 1.4, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawHexStroke(progress) {
  ctx.save();
  ctx.strokeStyle = NAVY;
  ctx.lineWidth = 6;
  ctx.lineJoin = 'round';
  // approximate stroke length: 6 cạnh, mỗi cạnh dài HEX_R (do lục giác đều)
  // thực tế cạnh = R, total = 6R
  const totalLen = 6 * HEX_R;
  ctx.setLineDash([totalLen, totalLen]);
  ctx.lineDashOffset = totalLen * (1 - progress);
  hexPath();
  ctx.stroke();
  ctx.restore();
}

function drawHexFill(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = NAVY;
  hexPath();
  ctx.fill();
  ctx.restore();
}

function drawPTText(progress) {
  const s = ease.outBack(Math.min(1, Math.max(0, progress)));
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(0.6 + 0.4 * s, 0.6 + 0.4 * s);
  ctx.fillStyle = GOLD;
  ctx.font = 'bold 180px "Arial Black", system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('PT', 0, 0);
  ctx.restore();
}

function drawTagline(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = NAVY;
  ctx.font = '600 28px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillText('PT FLOUR · VIETNAM', cx, cy + 290);
  ctx.restore();
}

function drawTaglineVI(alpha) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = NAVY;
  ctx.font = '500 22px system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  // chính tả "Từ hạt lúa mì Việt, đến tay bạn."
  ctx.fillText('TỪ HẠT LÚA MÌ VIỆT, ĐẾN TAY BẠN', cx, cy + 330);
  ctx.restore();
}

function drawBg() {
  // gradient cream radial
  const g = ctx.createRadialGradient(cx, cy-100, 100, cx, cy, 1200);
  g.addColorStop(0, '#fff7e0');
  g.addColorStop(0.5, CREAM);
  g.addColorStop(1, CREAM_DEEP);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
}

function drawParticle(p, t) {
  const local = (t - p.delay) / p.duration;
  if (local <= 0) return;
  const k = ease.outCubic(Math.min(1, local));
  const x = p.sx + (p.tx - p.sx) * k;
  const y = p.sy + (p.ty - p.sy) * k;
  const alpha = local < 0.15 ? local/0.15 : 1;
  ctx.save();
  ctx.globalAlpha = alpha * 0.95;
  ctx.fillStyle = p.color;
  ctx.shadowColor = p.color;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(x, y, p.r, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// === Frame composer ===
function renderFrame(t) {
  // t: seconds in [0, DURATION]
  drawBg();

  // Particles: 0.4 → 1.6
  for (const p of particles) drawParticle(p, t);

  // Hex stroke draw: 1.4 → 2.0
  if (t >= 1.4) {
    const k = Math.min(1, (t - 1.4) / 0.6);
    drawHexStroke(k);
  }
  // Hex fill: 1.8 → 2.4
  if (t >= 1.8) {
    const k = Math.min(1, (t - 1.8) / 0.6);
    drawHexFill(k);
    // after fill, re-stroke for crisp edge
    ctx.save();
    ctx.strokeStyle = NAVY_DEEP;
    ctx.lineWidth = 2;
    hexPath(); ctx.stroke();
    ctx.restore();
  }

  // Dolphins swim in: 2.4 → 3.4
  if (t >= 2.4 && t < 3.6) {
    const k = Math.min(1, (t - 2.4) / 1.0);
    drawDolphin(k, false);
    drawDolphin(k, true);
  }
  // After settle: draw dolphins at end position, on top of hex
  if (t >= 3.4) {
    drawDolphin(1.0, false);
    drawDolphin(1.0, true);
  }

  // PT text: 3.2 → 3.8
  if (t >= 3.2) {
    const k = Math.min(1, (t - 3.2) / 0.6);
    drawPTText(k);
  }

  // Tagline: 3.6 → 4.6
  if (t >= 3.6) {
    const k = Math.min(1, (t - 3.6) / 1.0);
    drawTagline(k);
    drawTaglineVI(k * 0.85);
  }
}

// === MediaRecorder setup ===
const stream = c.captureStream(FPS);
const mimeCandidates = [
  'video/webm;codecs=vp9',
  'video/webm;codecs=vp8',
  'video/webm',
];
let mime = '';
for (const m of mimeCandidates) {
  if (MediaRecorder.isTypeSupported(m)) { mime = m; break; }
}
if (!mime) {
  document.title = 'ERR_NO_MIME';
  throw new Error('No supported webm mime');
}
const chunks = [];
const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 6_000_000 });

rec.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
rec.onstop = () => {
  const blob = new Blob(chunks, { type: mime });
  // expose blob URL qua global để script bên ngoài đọc
  const reader = new FileReader();
  reader.onload = () => {
    // ghi ra ArrayBuffer dạng base64 lên window để puppeteer lấy
    const b64 = btoa(String.fromCharCode(...new Uint8Array(reader.result)));
    window.__videoB64 = b64;
    window.__videoMime = mime;
    window.__videoReady = true;
    document.title = 'RENDER_DONE';
  };
  reader.readAsArrayBuffer(blob);
};

window.__render = async function() {
  // pre-render 1 frame để khởi động
  renderFrame(0);
  rec.start();
  const t0 = performance.now();
  for (let i = 0; i < FRAMES; i++) {
    const t = (i / FPS);
    renderFrame(t);
    // pace to real-time
    const target = t0 + (i+1) * (1000/FPS);
    const now = performance.now();
    if (now < target) await new Promise(r => setTimeout(r, target - now));
  }
  rec.stop();
};
</script>
</body>
</html>
